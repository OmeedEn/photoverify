<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="shieldGradText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#00b8a3"/>
    </linearGradient>
  </defs>
  <!-- Shield icon scaled to fit -->
  <g transform="translate(10, 4) scale(0.56)">
    <!-- Shield outline -->
    <path d="M100 12 L176 52 L176 108 C176 148 144 180 100 196 C56 180 24 148 24 108 L24 52 Z"
          fill="none" stroke="url(#shieldGradText)" stroke-width="8" stroke-linejoin="round"/>
    <!-- Inner fill -->
    <path d="M100 28 L164 62 L164 110 C164 143 137 170 100 184 C63 170 36 143 36 110 L36 62 Z"
          fill="#00e5cc" fill-opacity="0.08"/>
    <!-- Lens circle -->
    <circle cx="100" cy="100" r="32" fill="none" stroke="#00e5cc" stroke-width="5"/>
    <circle cx="100" cy="100" r="18" fill="none" stroke="#00e5cc" stroke-width="3" stroke-opacity="0.5"/>
    <!-- Checkmark -->
    <path d="M82 100 L94 112 L118 88" fill="none" stroke="#00e5cc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text: "Photo" in white, "Verify" in teal -->
  <text x="140" y="76" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="-1">
    <tspan fill="#f0f0f0">Photo</tspan><tspan fill="#00e5cc">Verify</tspan>
  </text>
</svg>