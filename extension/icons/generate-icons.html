<!DOCTYPE html>
<html>
<head><title>Generate Extension Icons</title></head>
<body>
<p>Open this file in a browser, right-click each canvas, and "Save image as" to create the icon PNGs.</p>
<div>
  <h3>16x16</h3>
  <canvas id="c16" width="16" height="16"></canvas>
  <h3>48x48</h3>
  <canvas id="c48" width="48" height="48"></canvas>
  <h3>128x128</h3>
  <canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#0a0e14';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();
  // Shield shape
  ctx.fillStyle = '#00e5cc';
  ctx.beginPath();
  const cx = s/2, top = s*0.15, bot = s*0.82, mid = s*0.55;
  ctx.moveTo(cx, top);
  ctx.quadraticCurveTo(s*0.85, s*0.22, s*0.85, mid);
  ctx.quadraticCurveTo(s*0.85, bot, cx, s*0.92);
  ctx.quadraticCurveTo(s*0.15, bot, s*0.15, mid);
  ctx.quadraticCurveTo(s*0.15, s*0.22, cx, top);
  ctx.fill();
  // Checkmark
  ctx.strokeStyle = '#0a0e14';
  ctx.lineWidth = s * 0.08;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s*0.32, s*0.52);
  ctx.lineTo(s*0.45, s*0.65);
  ctx.lineTo(s*0.68, s*0.40);
  ctx.stroke();
}
drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
