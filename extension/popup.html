<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 200px;
      background: #0a0e14;
      color: #e8edf4;
      font-family: 'Outfit', sans-serif;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e2836;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .logo-icon {
      width: 28px;
      height: 28px;
      background: rgba(0, 229, 204, 0.15);
      border: 1px solid rgba(0, 229, 204, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header .logo-icon svg {
      width: 14px;
      height: 14px;
      color: #00e5cc;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header h1 span { color: #00e5cc; }

    .content { padding: 20px; }

    .empty-state {
      text-align: center;
      padding: 24px 0;
    }

    .empty-state p {
      color: #8899aa;
      font-size: 13px;
      line-height: 1.5;
    }

    .empty-state .hint {
      color: #556677;
      font-size: 11px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Score display */
    .score-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .score-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }

    .score-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #556677;
      margin-top: 4px;
    }

    .score-green { color: #22c55e; }
    .score-yellow { color: #f59e0b; }
    .score-red { color: #ef4444; }

    /* Verdict badge */
    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 16px;
    }

    .verdict-original {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .verdict-found {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.25);
    }

    .verdict-scam {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    /* Reasons */
    .reasons { list-style: none; }

    .reasons li {
      font-size: 12px;
      color: #8899aa;
      padding: 8px 12px;
      background: #151b23;
      border-radius: 8px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .reasons li .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .dot-green { background: #22c55e; }
    .dot-yellow { background: #f59e0b; }
    .dot-red { background: #ef4444; }

    /* Error */
    .error {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }

    /* Open app link */
    .open-app {
      display: block;
      text-align: center;
      padding: 12px;
      border-top: 1px solid #1e2836;
      color: #00e5cc;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
    }

    .open-app:hover {
      background: rgba(0, 229, 204, 0.08);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
      </svg>
    </div>
    <h1>Photo<span>Verify</span></h1>
  </div>

  <div class="content" id="content">
    <div class="empty-state">
      <p>Right-click any product image and select<br>"Verify this image with TrustLens"</p>
      <p class="hint">Works on Facebook Marketplace, OfferUp, Reddit, and more</p>
    </div>
  </div>

  <a href="http://localhost:3000" target="_blank" class="open-app">Open Full App ></a>

  <script src="popup.js"></script>
</body>
</html>
